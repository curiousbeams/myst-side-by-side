# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: translation-directive-demo
  title: Side-by-side Document translation
  description: Custom directive to show two rendered myst documents side-by-side, linking between the two.
  # keywords: []
  # authors: []
  # github:
  plugins:
    # This repository is the plugin source, so it loads the local file;
    # consumers can use the URL form instead (see README):
    # - https://raw.githubusercontent.com/curiousbeams/myst-side-by-side/main/side-by-side.mjs
    - side-by-side.mjs
  exclude:
    - README.md
    - new/*.md
    - old/*.md
site:
  template: book-theme
